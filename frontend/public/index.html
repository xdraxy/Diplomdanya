<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#09090b" />
        <meta
            name="description"
            content="SyncPlay — синхронное прослушивание музыки в комнатах"
        />
        <title>SyncPlay — синхронное прослушивание</title>
        <script>
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true,
            );
        </script>
    </head>
    <body>
        <noscript>Включите JavaScript для работы приложения.</noscript>
        <div id="root"></div>
    </body>
</html>
